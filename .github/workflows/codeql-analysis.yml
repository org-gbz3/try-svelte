name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@b374143c1141b982290ae0e4855799a7c913d1ca  # github/codeql-action/init@v3
      with:
        languages: javascript-typescript # 使用言語に合わせて変更してください

    - name: Autobuild
      uses: github/codeql-action/autobuild@b374143c1141b982290ae0e4855799a7c913d1ca  # github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@b374143c1141b982290ae0e4855799a7c913d1ca  # github/codeql-action/analyze@v3
