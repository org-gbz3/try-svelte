name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13  # github/codeql-action/init@v4.35.1
      with:
        languages: javascript-typescript # 使用言語に合わせて変更してください

    - name: Autobuild
      uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13  # github/codeql-action/autobuild@v4.35.1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13  # github/codeql-action/analyze@v4.35.1
